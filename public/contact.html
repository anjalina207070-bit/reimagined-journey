<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Maison Étoile</title>
  <link href="/assets/styles/main.css" rel="stylesheet" />
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a href="/index.html" class="brand">
        <span class="brand-logo"></span>
        <span class="brand-name">Maison Étoile</span>
      </a>
      <nav class="nav-links">
        <a href="/shop.html">Shop</a>
        <a href="/about.html">About</a>
        <a href="/contact.html">Contact</a>
      </nav>
      <div class="cta">
        <a href="/shop.html" class="btn secondary">Explore</a>
        <button class="btn">Cart <span class="mono" data-cart-badge hidden>0</span></button>
      </div>
    </div>
  </header>

  <main class="container section">
    <div class="hero-card">
      <div class="copy">
        <h1 class="hero-title">Contact Us</h1>
        <p class="hero-subtitle">Questions about sizing, orders, or stockists? We’re here to help.</p>
        <form data-newsletter onsubmit="return false;" style="margin-top:12px;">
          <div style="display:grid;gap:10px;max-width:520px;">
            <input name="name" placeholder="Name" required style="padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#0f0f14;color:#fff;" />
            <input name="email" type="email" placeholder="Email" required style="padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#0f0f14;color:#fff;" />
            <textarea name="message" placeholder="Message" rows="4" required style="padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#0f0f14;color:#fff;"></textarea>
            <button class="btn" type="submit">Send</button>
          </div>
        </form>
      </div>
      <div class="hero-media"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div>&copy; <span id="year"></span> Maison Étoile.</div>
    </div>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="/assets/scripts/main.js" defer></script>
</body>
</html>
