<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop — Maison Étoile</title>
  <link href="/assets/styles/main.css" rel="stylesheet" />
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a href="/index.html" class="brand">
        <span class="brand-logo"></span>
        <span class="brand-name">Maison Étoile</span>
      </a>
      <nav class="nav-links">
        <a href="/shop.html">Shop</a>
        <a href="/about.html">About</a>
        <a href="/contact.html">Contact</a>
      </nav>
      <div class="cta">
        <a href="/shop.html" class="btn secondary">Explore</a>
        <button class="btn">Cart <span class="mono" data-cart-badge hidden>0</span></button>
      </div>
    </div>
  </header>

  <main class="container section">
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap;">
      <button class="btn secondary active" data-filter="all">All</button>
      <button class="btn secondary" data-filter="dresses">Dresses</button>
      <button class="btn secondary" data-filter="jackets">Jackets</button>
      <button class="btn secondary" data-filter="bags">Bags</button>
      <button class="btn secondary" data-filter="shoes">Shoes</button>
      <input data-filter-input placeholder="Search products" style="margin-left:auto;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#0f0f14;color:#fff;width:min(320px,100%);" />
    </div>

    <div class="grid" data-products-grid></div>
  </main>

  <footer class="footer">
    <div class="container">
      <div>&copy; <span id="year"></span> Maison Étoile.</div>
    </div>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="/assets/scripts/main.js" defer></script>
  <script src="/assets/scripts/shop.js" defer></script>
</body>
</html>
